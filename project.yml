name: FocusFriend
options:
  bundleIdPrefix: com.aaali5
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  FocusFriend:
    type: application
    platform: iOS
    sources:
      - FocusFriend
    settings:
      base:
        INFOPLIST_FILE: FocusFriend/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aaali5.FocusFriend
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
